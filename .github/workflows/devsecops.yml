name: BK DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: [self-hosted, rhel9]

    steps:
      - uses: actions/checkout@v7

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs .

      - name: SonarQube Scan
        run: |
          /opt/sonar/sonar-scanner-7.1.0.4889-linux-x64/bin/sonar-scanner \
          -Dsonar.host.url=http://localhost:9000 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  docker-build:
    runs-on: [self-hosted, rhel9]
    needs: security-scan

    steps:
      - uses: actions/checkout@v7

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Vote Image
        run: |
          docker build -t jckabayiza/voteapp:latest ./vote

      - name: Push Vote Image
        run: |
          docker push jckabayiza/voteapp:latest
